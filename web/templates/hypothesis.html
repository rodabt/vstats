
<h1>Hypothesis Tests</h1>
<p class="subtitle">Parametric, non-parametric, and goodness-of-fit tests.</p>

<div x-data="hypothesisCalc()" x-cloak>

  <div class="card">
    <div class="field">
      <label>Test</label>
      <select x-model="test">
        <option value="t_test_two_sample">Two-sample t-test</option>
        <option value="t_test_one_sample">One-sample t-test</option>
        <option value="mann_whitney">Mann-Whitney U (non-parametric)</option>
        <option value="ks_test">Kolmogorov-Smirnov</option>
        <option value="chi_squared">Chi-squared (contingency table)</option>
        <option value="shapiro_wilk">Shapiro-Wilk (normality)</option>
        <option value="correlation">Pearson correlation</option>
        <option value="wilcoxon">Wilcoxon signed-rank</option>
      </select>
    </div>

    <template x-if="needsTwo()">
      <div>
        <div class="field"><label x-text="test==='wilcoxon' ? 'Before (paired)' : 'Group A / Sample 1'"></label><textarea x-model="f.x" placeholder="1.2, 2.3, 3.1, ..."></textarea></div>
        <div class="field"><label x-text="test==='wilcoxon' ? 'After (paired)' : 'Group B / Sample 2'"></label><textarea x-model="f.y" placeholder="1.5, 2.1, 3.4, ..."></textarea></div>
      </div>
    </template>

    <template x-if="needsOne()">
      <div>
        <div class="field"><label>Sample data</label><textarea x-model="f.x" placeholder="1.2, 2.3, 3.1, ..."></textarea></div>
        <div class="field" x-show="test==='t_test_one_sample'" style="max-width:200px"><label>Hypothesised mean (&#956;&#8320;)</label><input type="number" step="any" x-model.number="f.mu"></div>
      </div>
    </template>

    <template x-if="test==='chi_squared'">
      <div class="field">
        <label>Contingency table (one row per line, comma-separated values)</label>
        <textarea x-model="f.contingency" rows="4" placeholder="10, 20&#10;30, 40"></textarea>
        <div class="hint">Example 2&#215;2 table: first row on line 1, second row on line 2</div>
      </div>
    </template>

    <div class="field" style="max-width:160px" x-show="test !== 'chi_squared' && test !== 'mann_whitney' && test !== 'wilcoxon' && test !== 'ks_test' && test !== 'shapiro_wilk'">
      <label>Alpha (&#945;)</label>
      <input type="number" step="0.01" min="0.01" max="0.2" x-model.number="f.alpha">
    </div>

    <div class="error-banner" x-show="error" x-text="error"></div>
    <button class="btn btn-primary" @click="submit()" :disabled="loading">
      <span x-show="loading" class="spinner"></span>
      <span x-text="loading ? 'Calculating...' : 'Run Test'"></span>
    </button>
  </div>

  <div class="result-card" x-show="result">
    <div class="result-header">
      <h2>Test Result</h2>
      <span class="badge" :class="result && result.significant ? 'badge-sig' : 'badge-nosig'"
            x-text="result && result.significant ? 'Significant' : 'Not Significant'"></span>
    </div>
    <div class="stat-grid">
      <div class="stat-box"><div class="label" x-text="hypStatLabel(test)"></div><div class="value" x-text="result ? fmt(result.statistic, 3) : ''"></div></div>
      <div class="stat-box"><div class="label">p-value</div><div class="value" :class="result && result.significant ? 'sig' : 'nosig'" x-text="result ? fmt(result.p_value) : ''"></div></div>
    </div>
    <div class="interp" x-text="hypInterp(result)"></div>
  </div>

</div>
