
<h1>A/B Test Calculator</h1>
<p class="subtitle">Welch's t-test for continuous metrics &middot; two-proportion z-test for binary outcomes.</p>

<div x-data="abTest()" x-cloak>

  <div class="card">
    <div class="mode-toggle">
      <button :class="metric==='proportion' ? 'active' : ''" @click="metric='proportion';result=null;error=null">Proportion (Binary)</button>
      <button :class="metric==='summary' ? 'active' : ''" @click="metric='summary';result=null;error=null">Continuous (Summary)</button>
      <button :class="metric==='continuous' ? 'active' : ''" @click="metric='continuous';result=null;error=null">Continuous (Raw data)</button>
    </div>

    <template x-if="metric==='proportion'">
      <div>
        <div class="did-explainer">
          <p><strong>When to use:</strong> Your metric is binary &mdash; each user either converts or not (sign-up, purchase, click). Enter the cumulative success count and total users for each group. Uses a two-proportion z-test.</p>
          <p class="did-example"><em>Example:</em> 10,000 users per group in a checkout-flow test. The new flow got 530 sign-ups vs 480 on the old one.</p>
        </div>
        <div class="field-row">
          <div class="field"><label>Control successes</label><input type="number" min="0" x-model.number="p.successes_a"></div>
          <div class="field"><label>Control total (n)</label><input type="number" min="1" x-model.number="p.n_a"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Treatment successes</label><input type="number" min="0" x-model.number="p.successes_b"></div>
          <div class="field"><label>Treatment total (n)</label><input type="number" min="1" x-model.number="p.n_b"></div>
        </div>
        <div class="field" style="max-width:160px"><label>Alpha (&#945;)</label><input type="number" step="0.01" min="0.01" max="0.2" x-model.number="p.alpha"></div>
      </div>
    </template>

    <template x-if="metric==='summary'">
      <div>
        <div class="did-explainer">
          <p><strong>When to use:</strong> You already have aggregated statistics from your data warehouse &mdash; mean, standard deviation, and sample size for each group. Uses Welch's t-test from summary statistics.</p>
          <p class="did-example"><em>Example:</em> Your analytics tool reports: control avg order value $12.50 (&sigma;=2.30, n=1,000), treatment $13.10 (&sigma;=2.40, n=1,000).</p>
        </div>
        <p style="font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.75rem;">Control group</p>
        <div class="field-row">
          <div class="field"><label>Mean</label><input type="number" step="any" x-model.number="s.control_mean"></div>
          <div class="field"><label>Std Dev</label><input type="number" min="0" step="any" x-model.number="s.control_std"></div>
          <div class="field"><label>n</label><input type="number" min="2" x-model.number="s.control_n"></div>
        </div>
        <p style="font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.75rem;">Treatment group</p>
        <div class="field-row">
          <div class="field"><label>Mean</label><input type="number" step="any" x-model.number="s.treatment_mean"></div>
          <div class="field"><label>Std Dev</label><input type="number" min="0" step="any" x-model.number="s.treatment_std"></div>
          <div class="field"><label>n</label><input type="number" min="2" x-model.number="s.treatment_n"></div>
        </div>
        <div class="field" style="max-width:160px"><label>Alpha (&#945;)</label><input type="number" step="0.01" min="0.01" max="0.2" x-model.number="s.alpha"></div>
      </div>
    </template>

    <template x-if="metric==='continuous'">
      <div>
        <div class="did-explainer">
          <p><strong>When to use:</strong> You have individual-level metric values for each user. Paste them one per row. Uses Welch's t-test on the raw data.</p>
          <p class="did-example"><em>Example:</em> Session duration in seconds for each user in your experiment. Export from your event log and paste the column directly.</p>
        </div>
        <div class="field"><label>Control data</label><textarea x-model="raw.control_data" placeholder="12.1&#10;11.8&#10;13.4&#10;12.0&#10;..."></textarea></div>
        <div class="field"><label>Treatment data</label><textarea x-model="raw.treatment_data" placeholder="13.5&#10;14.2&#10;12.9&#10;13.8&#10;..."></textarea></div>
        <div class="field" style="max-width:160px"><label>Alpha (&#945;)</label><input type="number" step="0.01" min="0.01" max="0.2" x-model.number="raw.alpha"></div>
      </div>
    </template>

    <div class="error-banner" x-show="error" x-text="error"></div>
    <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap">
      <button class="btn btn-primary" @click="submit()" :disabled="loading">
        <span x-show="loading" class="spinner"></span>
        <span x-text="loading ? 'Calculating...' : 'Calculate'"></span>
      </button>
      <button class="btn btn-secondary" @click="loadExample()">Load example</button>
    </div>
  </div>

  <div class="result-card" x-show="result">
    <div class="result-header">
      <h2>Result</h2>
      <span class="badge" :class="result && result.significant ? 'badge-sig' : 'badge-nosig'"
            x-text="result && result.significant ? 'Significant' : 'Not Significant'"></span>
    </div>
    <div class="stat-grid">
      <div class="stat-box">
        <div class="label">p-value</div>
        <div class="value" :class="result && result.significant ? 'sig' : 'nosig'" x-text="result ? fmt(result.p_value) : ''"></div>
      </div>
      <div class="stat-box" x-show="result && result.t_statistic !== 0">
        <div class="label">t-statistic</div>
        <div class="value" x-text="result ? fmt(result.t_statistic, 3) : ''"></div>
      </div>
      <div class="stat-box" x-show="result && result.z_statistic !== 0">
        <div class="label">z-statistic</div>
        <div class="value" x-text="result ? fmt(result.z_statistic, 3) : ''"></div>
      </div>
      <div class="stat-box">
        <div class="label">Relative Lift</div>
        <div class="value" x-text="result ? pct(result.relative_lift) : ''"></div>
      </div>
      <div class="stat-box" x-show="result && result.effect_size !== 0">
        <div class="label">Effect Size (d)</div>
        <div class="value" x-text="result ? fmt(result.effect_size, 3) : ''"></div>
      </div>
      <div class="stat-box">
        <div class="label">95% CI</div>
        <div class="value" style="font-size:1rem" x-text="result ? ciRange(result.ci_lower, result.ci_upper) : ''"></div>
      </div>
    </div>
    <div class="interp" x-text="abInterp(result)"></div>
  </div>

</div>
